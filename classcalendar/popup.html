<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>CLASS カレンダー登録</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>CLASS → Googleカレンダー</h1>
  </header>

  <div id="status" class="status"></div>

  <section class="date-section">
    <label>学期開始日<input type="date" id="startDate"></label>
    <label>学期終了日<input type="date" id="endDate"></label>
  </section>

  <section class="color-section">
    <label>カレンダーの色
      <select id="eventColor">
        <option value="">デフォルト</option>
        <option value="1">ラベンダー</option>
        <option value="2">セージ（緑）</option>
        <option value="3">グレープ（紫）</option>
        <option value="4">フラミンゴ（ピンク）</option>
        <option value="5">バナナ（黄）</option>
        <option value="6">タンジェリン（橙）</option>
        <option value="7">ピーコック（青緑）</option>
        <option value="8">グラファイト（灰）</option>
        <option value="9">ブルーベリー（濃青）</option>
        <option value="10">バジル（濃緑）</option>
        <option value="11">トマト（赤）</option>
      </select>
    </label>
    <label>通知
      <select id="notifyMinutes">
        <option value="">なし</option>
        <option value="5">5分前</option>
        <option value="10">10分前</option>
        <option value="15">15分前</option>
        <option value="30">30分前</option>
        <option value="60">1時間前</option>
      </select>
    </label>
  </section>

  <section class="calendar-section">
    <label class="checkbox-label">
      <input type="checkbox" id="useNewCalendar">
      新規カレンダー（CLASS時間割）として登録する
    </label>
  </section>

  <div class="action-row">
    <button id="scrapeBtn" title="CLASSの時間割ページから授業を読み込む">📋 時間割を再取得</button>
    <button id="loginBtn" title="Googleカレンダーに直接登録するためにログイン">🔑 Googleログイン</button>
  </div>

  <div id="courseList"></div>

  <div class="bulk-area" id="bulkArea" style="display:none">
    <div class="bulk-row">
      <button id="bulkDlBtn"  class="bulk-dl"  title="月〜金の全授業をまとめてICSファイルにダウンロード">💾 月〜金を一括DL</button>
      <button id="bulkRegBtn" class="bulk-reg" title="月〜金の全授業をGoogleカレンダーに一括登録">📅 月〜金を一括登録</button>
    </div>
    <p class="bulk-hint">DL → Googleカレンダー設定 → インポート</p>
    <div class="bulk-row" style="margin-top:8px">
      <button id="deleteBtn" class="bulk-delete" title="この拡張機能で登録した期間内の予定をまとめて削除">🗑 登録済み予定を削除</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
