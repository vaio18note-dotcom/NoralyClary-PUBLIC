<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>LETUS Auto Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>🔐 LETUS Auto Login</h1>
  </header>

  <div id="status" class="status"></div>

  <section class="main-section">
    <div id="loginStatus" class="login-status">
      <p>ログイン状態: <strong id="statusText">確認中...</strong></p>
    </div>

    <div id="actionButtons">
      <button id="loginBtn" class="btn btn-primary">
        🔑 LETUS にログイン
      </button>
      <button id="logoutBtn" class="btn btn-secondary" style="display:none;">
        🚪 ログアウト
      </button>
      <button id="openLetusBtn" class="btn btn-info" style="display:none;">
        📖 LETUS を開く
      </button>
    </div>

    <div class="info-section">
      <h3>情報</h3>
      <p id="lastLogin" class="info-text">最終ログイン: 未登録</p>
      <p class="info-text" style="font-size: 11px; color: #666;">
        初回はログインボタンをクリック後、<br>
        Microsoft Authenticator で承認してください。
      </p>
    </div>
  </section>

  <script src="popup.js"></script>
</body>
</html>
